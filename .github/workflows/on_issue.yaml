name: CI (issue)

on:
  # Runs when a new issue is opened.
  issues:
    types:
      - opened

permissions:
  contents: read

jobs:
  label_issues:
    name: Add labels
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      # Add the "t-tooling" label to all new issues
      - uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ["t-tooling"]
            })

  # Send a Slack notification to the team alerting channel when there is a failure.
  notify_on_failure:
    name: Notify Slack on failure
    needs: label_issues
    if: failure()
    permissions:
      contents: read
      actions: read # Required for `gh api ...actions/runs/.../jobs` inside the reusable workflow.
    uses: ./.github/workflows/_notify_slack_on_failure.yaml
    with:
      heading: ':red_circle: Issue labeling failed'
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
