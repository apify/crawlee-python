name: CI (master)

on:
  push:
    branches:
      - master
    tags-ignore:
      - "**" # Ignore all tags to avoid duplicate executions triggered by tag pushes.

  # Allow re-running the Checks manually. Release jobs below are gated on `github.event_name == 'push'`
  # so they never fire on manual dispatch.
  workflow_dispatch:
    inputs:
      run_tests:
        description: Whether to run the unit test suite.
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    uses: ./.github/workflows/_checks.yaml
    with:
      # On push: skip the test suite for docs-only commits — they don't change runtime behavior.
      # On manual dispatch: honor the input.
      run_tests: ${{ github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'docs') || github.event_name == 'workflow_dispatch' && inputs.run_tests }}
    secrets: inherit

  doc_release:
    # Only on push, and only for "docs" commits.
    if: github.event_name == 'push' && startsWith(github.event.head_commit.message, 'docs')
    name: Doc release
    needs: [checks]
    permissions:
      contents: write
      pages: write
      id-token: write
      checks: read
    uses: ./.github/workflows/manual_release_docs.yaml
    with:
      # This workflow has its own notify_on_failure; suppress the nested one to avoid duplicate alerts.
      suppress_failure_notification: true
    secrets: inherit

  # The beta release is dispatched as a separate workflow run (instead of calling `manual_release_beta.yaml` via `uses:`)
  # because PyPI's Trusted Publishing does not currently support reusable workflows.
  # See: https://docs.pypi.org/trusted-publishers/troubleshooting/#reusable-workflows-on-github
  beta_release:
    # Only on push, and only for "feat", "fix", "perf", "refactor" and "style" commits.
    if: >-
      github.event_name == 'push' && (
        startsWith(github.event.head_commit.message, 'feat') ||
        startsWith(github.event.head_commit.message, 'fix') ||
        startsWith(github.event.head_commit.message, 'perf') ||
        startsWith(github.event.head_commit.message, 'refactor') ||
        startsWith(github.event.head_commit.message, 'style')
      )
    name: Beta release
    needs: [checks]
    runs-on: ubuntu-latest
    permissions:
      actions: write # Required by execute-workflow.
    steps:
      - name: Dispatch beta release workflow
        uses: apify/actions/execute-workflow@v1.1.2
        with:
          workflow: manual_release_beta.yaml

  # Send a Slack notification to the team alerting channel when there is a failure.
  # Note: `beta_release` is a fire-and-forget dispatcher (it only kicks off `manual_release_beta.yaml`
  # via execute-workflow). Failures inside the dispatched beta run are caught by that workflow's own
  # `notify_on_failure`, not by this one.
  notify_on_failure:
    name: Notify Slack on failure
    needs: [doc_checks, doc_release, code_checks, tests, beta_release]
    if: failure()
    permissions:
      contents: read
      actions: read # Required for `gh api ...actions/runs/.../jobs` inside the reusable workflow.
    uses: ./.github/workflows/_notify_slack_on_failure.yaml
    with:
      heading: ':red_circle: Master CI failed'
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
