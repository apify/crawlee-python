name: Release docs

on:
  # Runs when manually triggered from the GitHub UI.
  workflow_dispatch:
    inputs:
      ref:
        description: Commit SHA or ref to build the docs from. If empty, the triggering ref is used.
        required: false
        type: string
        default: ""

  # Runs when invoked by another workflow.
  workflow_call:
    inputs:
      ref:
        description: Commit SHA or ref to build the docs from. If empty, the triggering ref is used.
        required: false
        type: string
        default: ""

permissions:
  contents: read

env:
  NODE_VERSION: 22
  PYTHON_VERSION: 3.14

jobs:
  release_docs:
    name: Release docs
    environment:
      name: github-pages
    permissions:
      contents: write
      pages: write
      id-token: write
      checks: read
    runs-on: ubuntu-latest

    steps:
      # Gate manual dispatches on the `Checks` workflow already succeeding on this commit (run by `on_master.yaml`);
      # skipped when called from another workflow.
      - name: Wait for checks
        if: github.event_name == 'workflow_dispatch'
        uses: apify/actions/wait-for-checks@v1.2.0
        with:
          ref: ${{ github.sha }}
          check-regexp: '^Checks'

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv package manager
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: uv run poe install-dev

      - name: Install pnpm and website dependencies
        uses: apify/actions/pnpm-install@v1.2.0
        with:
          working-directory: website

      - name: Build Docusaurus docs
        run: uv run poe build-docs
        env:
          APIFY_SIGNING_TOKEN: ${{ secrets.APIFY_SIGNING_TOKEN }}
          SEGMENT_TOKEN: ${{ secrets.SEGMENT_TOKEN }}

      - name: Set up GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./website/build

      - name: Deploy artifact to GitHub Pages
        uses: actions/deploy-pages@v5

      - name: Invalidate CloudFront cache
        run: |
          gh workflow run invalidate-cloudfront.yml \
            --repo apify/apify-docs-private \
            --field deployment=crawlee-web
          echo "✅ CloudFront cache invalidation workflow triggered successfully"
        env:
          GITHUB_TOKEN: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
