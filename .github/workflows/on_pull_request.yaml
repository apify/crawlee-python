name: CI (PR)

on:
  # Runs whenever a pull request is opened or updated.
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  pr_title_check:
    name: PR title check
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  doc_checks:
    name: Doc checks
    uses: ./.github/workflows/_check_docs.yaml

  code_checks:
    name: Code checks
    uses: ./.github/workflows/_check_code.yaml

  package_check:
    name: Package check
    uses: apify/workflows/.github/workflows/python_package_check.yaml@main
    with:
      package_name: crawlee
      src_package_dir: src/crawlee
      dist_dir: dist
      python_version: "3.14"
      extras: all
      smoke_code: |
        from crawlee.crawlers import (
            HttpCrawler, BeautifulSoupCrawler, ParselCrawler,
            PlaywrightCrawler, AdaptivePlaywrightCrawler,
        )
        from crawlee.storages import Dataset, KeyValueStore, RequestQueue
        from crawlee.http_clients import HttpxHttpClient, ImpitHttpClient
        from crawlee import Request
        HttpCrawler()
        BeautifulSoupCrawler()
        ParselCrawler()

  tests:
    name: Tests
    uses: ./.github/workflows/_tests.yaml
    secrets: inherit
